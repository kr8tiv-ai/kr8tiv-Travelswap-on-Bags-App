services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flightbrain
      POSTGRES_USER: flightbrain
      POSTGRES_PASSWORD: flightbrain_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightbrain -d flightbrain"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.docker
    environment:
      # ── Database ──
      DATABASE_URL: postgresql://flightbrain:flightbrain_dev@postgres:5432/flightbrain

      # ── Required Secrets (provide via .env or override) ──
      BAGS_API_KEY: ${BAGS_API_KEY:-<your-bags-api-key>}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-<your-helius-api-key>}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-<your-api-auth-token>}
      GIFT_CARD_ENCRYPTION_KEY: ${GIFT_CARD_ENCRYPTION_KEY:-<your-64-hex-char-key>}

      # ── Optional Secrets ──
      SIGNER_PRIVATE_KEY: ${SIGNER_PRIVATE_KEY:-}
      DUFFEL_API_TOKEN: ${DUFFEL_API_TOKEN:-}

      # ── Execution Controls ──
      DRY_RUN: ${DRY_RUN:-true}
      EXECUTION_KILL_SWITCH: ${EXECUTION_KILL_SWITCH:-false}
      MAX_DAILY_RUNS: ${MAX_DAILY_RUNS:-4}
      MAX_CLAIMABLE_SOL_PER_RUN: ${MAX_CLAIMABLE_SOL_PER_RUN:-100}

      # ── Fee & Swap ──
      FEE_THRESHOLD_SOL: ${FEE_THRESHOLD_SOL:-5}
      FEE_SOURCE: ${FEE_SOURCE:-CLAIMABLE_POSITIONS}
      SWAP_SLIPPAGE_BPS: ${SWAP_SLIPPAGE_BPS:-50}

      # ── Distribution ──
      DISTRIBUTION_MODE: ${DISTRIBUTION_MODE:-TOP_N_HOLDERS}
      DISTRIBUTION_TOP_N: ${DISTRIBUTION_TOP_N:-100}

      # ── Credit ──
      CREDIT_MODE: ${CREDIT_MODE:-GIFT_CARD}
      GIFT_CARD_DAILY_LIMIT: ${GIFT_CARD_DAILY_LIMIT:-20}
      GIFT_CARD_MAX_DENOMINATION: ${GIFT_CARD_MAX_DENOMINATION:-200}
      BALANCE_MAX_USD: ${BALANCE_MAX_USD:-1000}
      TRAVELSWAP_PARTNER_REF: ${TRAVELSWAP_PARTNER_REF:-FLIGHTBRAIN}

      # ── Scheduling ──
      CRON_EXPRESSION: ${CRON_EXPRESSION:-0 */6 * * *}

      # ── Server ──
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STATIC_DIR: /app/frontend/dist
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
